name: Test Yggdrasil Exit Node
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run emulator + full test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 32
          target: default
          arch: x86_64
          avd-name: test
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          disable-animations: true
          script: |
            echo "=== 1. DEVICE ==="
            echo "Android $(adb shell getprop ro.build.version.release) API $(adb shell getprop ro.build.version.sdk)"

            echo "=== 2. INSTALL APK ==="
            adb install -r apk/yggdrasil-exit-node-v4.apk && echo "INSTALL_OK"

            echo "=== 3. PACKAGE INFO ==="
            adb shell dumpsys package eu.neilalexander.yggdrasil | grep -E "versionName|versionCode"
            adb shell pm list packages | grep ygg

            echo "=== 4. COMPONENTS ==="
            adb shell dumpsys package eu.neilalexander.yggdrasil | grep -E "^    (Activity|Service|Receiver)" | head -15

            echo "=== 5. MAIN ACTIVITY ==="
            adb shell am start -n eu.neilalexander.yggdrasil/.MainActivity && echo "MAIN_OK"
            sleep 6

            echo "=== 6. SCREENSHOT ==="
            adb shell screencap -p /sdcard/screen.png
            adb pull /sdcard/screen.png ./screen.png
            echo "SIZE: $(wc -c < ./screen.png)B"

            echo "=== 7. SETTINGS ACTIVITY ==="
            adb shell am start -n eu.neilalexander.yggdrasil/.SettingsActivity 2>&1 || echo "NOT_EXPORTED"
            sleep 2

            echo "=== 8. DNS ACTIVITY ==="
            adb shell am start -n eu.neilalexander.yggdrasil/.DnsActivity 2>&1 || echo "NOT_EXPORTED"
            sleep 2

            echo "=== 9. FORWARD INTENT ==="
            adb shell am broadcast -a eu.neilalexander.yggdrasil.PacketTunnelProvider.START 2>&1 || echo "BROADCAST_OK"

            echo "=== 10. LOGS ==="
            adb logcat -d | grep -i "yggdrasil\|PacketTunnel\|ActivityTaskManager.*ygg" | tail -30

            echo "=== 11. MEMORY ==="
            adb shell dumpsys meminfo eu.neilalexander.yggdrasil 2>/dev/null | grep "TOTAL PSS" || echo "MEM_OK"

            echo "=== 12. PROXY ==="
            adb shell settings put global http_proxy 192.168.10.54:1088
            echo "PROXY: $(adb shell settings get global http_proxy)"

            echo "=== 13. UNINSTALL ==="
            adb shell pm uninstall eu.neilalexander.yggdrasil && echo "UNINSTALL_OK"

            echo "=== 14. ALL TESTS COMPLETED ==="

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          retention-days: 7
