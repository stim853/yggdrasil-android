name: Test Yggdrasil Exit Node
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run emulator + full test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 32
          target: default
          arch: x86_64
          avd-name: test
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          disable-animations: true
          script: |
            # ---- DEVICE CALIBRATION ----
            echo "=== DEVICE CALIBRATION ==="
            adb shell wm size
            adb shell getprop ro.build.version.release
            adb shell getprop ro.build.version.sdk

            # ---- INSTALL APK ----
            echo "=== INSTALL V4 APK ==="
            adb install -r apk/yggdrasil-exit-node-v4.apk && echo "INSTALL_OK" || echo "INSTALL_FAIL"

            # ---- PACKAGE VERIFICATION ----
            echo "=== PACKAGE CHECK ==="
            adb shell pm list packages | grep yggdrasil || echo "PACKAGE_NOT_FOUND"
            adb shell pm dump eu.neilalexander.yggdrasil | grep -E "versionName|versionCode|applicationInfo" | head -5

            # ---- UI INSPECTION ----
            echo "=== UI DUMP ==="
            adb shell uiautomator dump /sdcard/view.xml 2>/dev/null || true
            adb shell cat /sdcard/view.xml 2>/dev/null | grep -E "text=|content-desc=|class=" | head -30 || echo "UI_DUMP_EMPTY"

            # ---- START APP (MainActivity) ----
            echo "=== START APP ==="
            adb shell am start -n eu.neilalexander.yggdrasil/.MainActivity
            sleep 5

            # ---- SCREENSHOT MAIN ----
            echo "=== SCREENSHOT MAIN ==="
            adb shell screencap -p /sdcard/screen_main.png
            adb pull /sdcard/screen_main.png ./screen_main.png

            # ---- CHECK LOGS ----
            echo "=== LOG CHECK ==="
            adb logcat -d | grep -i "ygg\|PacketTunnel\|ExitNode\|peers" | tail -30

            # ---- INTERACT WITH APP (tap center) ----
            echo "=== UI INTERACT ==="
            adb shell uiautomator dump /sdcard/view2.xml 2>/dev/null || true
            adb shell cat /sdcard/view2.xml 2>/dev/null | grep -Eo 'bounds="\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]"' | head -10 || true

            # ---- CHECK STARTED STATE ----
            echo "=== SERVICE CHECK ==="
            adb shell dumpsys activity services | grep yggdrasil | head -10

            # ---- FORWARD + SETTINGS PROXY ----
            echo "=== PROXY SET ==="
            adb shell settings put global http_proxy 192.168.10.54:1088 || true
            sleep 1
            adb shell settings get global http_proxy

            # ---- SCREENSHOT FINAL ----
            sleep 2
            adb shell screencap -p /sdcard/screen_final.png
            adb pull /sdcard/screen_final.png ./screen_final.png

            echo "=== ALL TESTS COMPLETED ==="

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          retention-days: 7