name: Build APK

on:
  push:
    branches: [ exit-node ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - uses: android-actions/setup-android@v3
      
      - name: Install NDK 23
        run: echo "y" | sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;23.1.7779620" --sdk_root=$ANDROID_SDK_ROOT
      
      - name: Build Go library with NDK 23
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620
          export PATH=$PATH:$HOME/go/bin
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          cd libs/yggdrasil-go
          gomobile bind -target android -tags mobile -o yggdrasil.aar -ldflags="-s -w -checklinkname=0" ./contrib/mobile ./src/config
          cp yggdrasil.aar ../../app/libs/
      
      - name: Build APK
        run: ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-exit-node-apk
          path: app/build/outputs/apk/debug/*.apk