name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-java@v4
        with: { distribution: zulu, java-version: 17 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: android-actions/setup-android@v3
      - name: NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          mkdir -p $ANDROID_SDK_ROOT/ndk; mv android-ndk-r21e $ANDROID_SDK_ROOT/ndk/21.4.7075529
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV
      - name: gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
      - name: Patch mobile.go with AddPeer/RemovePeer
        run: |
          cd libs/yggdrasil-go
          cat >> contrib/mobile/mobile.go << 'PEEOF'

// AddPeer adds a peer dynamically. URI format: tcp://host:port or tls://host:port
func (m *Yggdrasil) AddPeer(uri string) error {
	u, err := url.Parse(uri)
	if err != nil {
		return err
	}
	return m.core.AddPeer(u, "")
}

// RemovePeer removes a peer dynamically.
func (m *Yggdrasil) RemovePeer(uri string) error {
	u, err := url.Parse(uri)
	if err != nil {
		return err
	}
	return m.core.RemovePeer(u, "")
}
PEEOF
      - name: Build AAR
        run: |
          cd libs/yggdrasil-go
          gomobile bind -target android -androidapi 21 -tags mobile -o yggdrasil.aar -ldflags="-s -w -checklinkname=0" ./contrib/mobile ./src/config ./contrib/exitnode
          mkdir -p ../../app/libs
          cp yggdrasil.aar ../../app/libs/
      - name: Build APK
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-exit-node-apk
          path: app/build/outputs/apk/debug/*.apk
