name: Build APK

on:
  push:
    branches: [ exit-node ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - uses: android-actions/setup-android@v3
      
      - name: Install NDK 25
        run: echo "y" | sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" --sdk_root=$ANDROID_SDK_ROOT
      
      - name: Build Go library
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH=$PATH:$HOME/go/bin
          cd libs/yggdrasil-go
          gomobile init
          cd ../..
          mkdir -p app/libs
          cd libs/yggdrasil-go
          ./contrib/mobile/build -a
          cp yggdrasil.aar ../../app/libs/
      
      - name: Build APK
        run: ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-exit-node-apk
          path: app/build/outputs/apk/debug/*.apk