name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: android-actions/setup-android@v3
      - name: Install NDK r21e
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          mkdir -p $ANDROID_SDK_ROOT/ndk
          mv android-ndk-r21e $ANDROID_SDK_ROOT/ndk/21.4.7075529
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV
      - name: Build library
        run: |
          cd libs/yggdrasil-go
          gomobile bind -target android -androidapi 21 -tags mobile -o yggdrasil.aar -ldflags="-s -w -checklinkname=0" ./contrib/mobile ./src/config
          mkdir -p ../../app/libs
          cp yggdrasil.aar ../../app/libs/
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
      - name: Build APK
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-exit-node-apk
          path: app/build/outputs/apk/debug/*.apk